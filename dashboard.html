<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCHAIOS Redirect</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #09111a;
        --bg-mid: #101823;
        --white: #edf2f7;
        --accent: #f5b05f;
        --accent-warm: #ff6f61;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(245, 176, 95, 0.18), transparent 34%),
          radial-gradient(circle at top right, rgba(99, 176, 255, 0.14), transparent 28%),
          linear-gradient(180deg, #0c1118 0%, #111927 100%);
        color: var(--white);
        padding: 24px;
      }

      .card {
        width: min(480px, 100%);
        padding: 28px;
        border-radius: 24px;
        background: rgba(9, 14, 21, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 60px rgba(10, 16, 27, 0.28);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 6vw, 42px);
        line-height: 0.95;
      }

      p {
        margin: 14px 0 0;
        color: rgba(237, 242, 247, 0.78);
        line-height: 1.5;
      }

      .button {
        display: inline-block;
        margin-top: 22px;
        padding: 12px 18px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-warm));
        color: #111927;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
    <script>
      (function () {
        var target = "/";
        window.setTimeout(function () {
          try {
            window.location.href = target;
          } catch (error) {
            window.redirectFailed = true;
          }
        }, 1000);
      })();
    </script>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">ARCHAIOS</p>
      <h1>Redirecting To Command Center</h1>
      <p>
        You will be sent to the live ARCHAIOS command center automatically. If redirect does not complete,
        use the fallback button below.
      </p>
      <a class="button" href="/">Open Dashboard</a>
    </main>
  </body>
</html>
