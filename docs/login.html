<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Assassins Auth</title>
  <style>
    :root {
      --bg: #0a0f16;
      --card: #121b27;
      --border: #2f455f;
      --text: #e9f2ff;
      --muted: #9cb2cb;
      --danger: #ff6f6f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #112033 0%, var(--bg) 48%);
      color: var(--text);
      font-family: "JetBrains Mono", "Fira Code", monospace;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f1722;
      color: var(--text);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #142235;
      color: var(--text);
      cursor: pointer;
    }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .error {
      margin-top: 10px;
      color: var(--danger);
      min-height: 1.2em;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login / Register</h1>
    <p>Use your email and password to access AI Assassins.</p>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@example.com">

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">

    <div class="actions">
      <button id="loginBtn" type="button">Login</button>
      <button id="registerBtn" type="button">Register</button>
    </div>

    <div id="error" class="error"></div>
  </main>

  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabaseClient.js"></script>
  <script>
    (() => {
      "use strict";

      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const registerBtn = document.getElementById("registerBtn");
      const errorEl = document.getElementById("error");

      function setError(message) {
        errorEl.textContent = message || "";
      }

      function setLoading(isLoading) {
        loginBtn.disabled = isLoading;
        registerBtn.disabled = isLoading;
      }

      function getForm() {
        const email = String(emailEl.value || "").trim();
        const password = String(passwordEl.value || "");
        if (!email || !password) {
          throw new Error("Email and password are required.");
        }
        return { email, password };
      }

      async function login() {
        setError("");
        setLoading(true);
        try {
          const { email, password } = getForm();
          const result = await window.AIASupabase.signIn(email, password);
          if (result?.error) throw result.error;
          window.location.href = "/dashboard";
        } catch (err) {
          setError(err?.message || "Login failed.");
        } finally {
          setLoading(false);
        }
      }

      async function register() {
        setError("");
        setLoading(true);
        try {
          const { email, password } = getForm();
          const result = await window.AIASupabase.signUp(email, password);
          if (result?.error) throw result.error;
          window.location.href = "/dashboard";
        } catch (err) {
          setError(err?.message || "Registration failed.");
        } finally {
          setLoading(false);
        }
      }

      loginBtn.addEventListener("click", login);
      registerBtn.addEventListener("click", register);
    })();
  </script>
</body>
</html>
